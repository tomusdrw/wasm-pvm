name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Check no-default-features (PVM types only)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check -p wasm-pvm --no-default-features
          cargo check -p wasm-pvm --no-default-features --target wasm32-unknown-unknown

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wasm-pvm-cli
        run: cargo build --release -p wasm-pvm-cli

      - name: Install anan-as dependencies
        run: cd vendor/anan-as && npm ci

      - name: Build anan-as
        run: cd vendor/anan-as && npm run build

      - name: Install tests dependencies
        run: cd tests && bun install

      - name: Build test artifacts
        run: cd tests && bun build.ts

      - name: Benchmark no-opt smoke check
        env:
          BENCHMARK_SKIP_POLKADOT: "1"
          BENCHMARK_SKIP_PVM_IN_PVM: "1"
        run: |
          ./tests/utils/benchmark.sh --no-opt 2>/dev/null \
            | awk '/^\| / && /SKIP/ { print; bad=1 } END { exit bad }'

      - name: Run integration tests (layers 1-3)
        run: cd tests && bun test layer1/ layer2/ layer3/

      - name: Check compilation determinism
        run: ./tests/utils/check-determinism.sh 10

  differential:
    name: Differential Tests
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wasm-pvm-cli
        run: cargo build --release -p wasm-pvm-cli

      - name: Install anan-as dependencies
        run: cd vendor/anan-as && npm ci

      - name: Build anan-as
        run: cd vendor/anan-as && npm run build

      - name: Install tests dependencies
        run: cd tests && bun install

      - name: Build test artifacts
        run: cd tests && bun build.ts

      - name: Run differential tests
        run: cd tests && bun test differential/ --test-name-pattern differential

  differential-no-opts:
    name: Differential Tests (--no-all-opts)
    runs-on: ubuntu-latest
    needs: integration
    env:
      # Compile every JAM with --no-all-opts so the differential suite
      # cross-checks PVM output (against native WASM) with every optional
      # optimization disabled. Catches miscompiles introduced by any opt.
      WASM_PVM_NO_OPTS: "1"
      # Skip the heavy `anan-as compiler.wasm -> JAM` build step (the JAM
      # only powers layers 4-5 PVM-in-PVM, which this job doesn't run).
      # The anan-as CLI runner itself still gets built — `runJam` needs it
      # to execute every layer-1/2/3 and differential JAM. Under --no-all-opts
      # the compiler JAM is much larger and several minutes slower to build.
      WASM_PVM_SKIP_ANAN_AS_COMPILER: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wasm-pvm-cli
        run: cargo build --release -p wasm-pvm-cli

      - name: Install anan-as dependencies
        run: cd vendor/anan-as && npm ci

      - name: Build anan-as
        run: cd vendor/anan-as && npm run build

      - name: Install tests dependencies
        run: cd tests && bun install

      - name: Build test artifacts (no-opts)
        run: cd tests && bun build.ts

      - name: Run integration tests (layers 1-3, no-opts)
        run: cd tests && bun test layer1/ layer2/ layer3/

      - name: Run differential tests (no-opts)
        run: cd tests && bun test differential/ --test-name-pattern differential

  pvm-in-pvm:
    name: PVM-in-PVM Tests (Layers 4-5)
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wasm-pvm-cli
        run: cargo build --release -p wasm-pvm-cli

      - name: Install anan-as dependencies
        run: cd vendor/anan-as && npm ci

      - name: Build anan-as
        run: cd vendor/anan-as && npm run build

      - name: Install tests dependencies
        run: cd tests && bun install

      - name: Build test artifacts
        run: cd tests && bun build.ts

      - name: Run PVM-in-PVM tests (layers 4-5)
        run: cd tests && bun test layer4/ layer5/
