name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump version and create draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate version input
        run: |
          VERSION='${{ inputs.version }}'
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "Error: version '$VERSION' does not match semver pattern (e.g. 1.2.3 or 1.2.3-beta.1)"
            exit 1
          fi
          echo "SAFE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update workspace version in Cargo.toml
        run: sed -i "s/^version = \".*\"/version = \"$SAFE_VERSION\"/" Cargo.toml

      - name: Regenerate Cargo.lock
        run: cargo generate-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        run: |
          git checkout -b "bump-version/v$SAFE_VERSION"
          git add Cargo.toml Cargo.lock
          git commit -m "Bump version to $SAFE_VERSION"

      - name: Push branch
        run: git push origin "bump-version/v$SAFE_VERSION"

      - name: Create Pull Request
        run: |
          gh pr create \
            --title "Bump version to $SAFE_VERSION" \
            --body "Automated version bump to $SAFE_VERSION." \
            --base main \
            --head "bump-version/v$SAFE_VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
